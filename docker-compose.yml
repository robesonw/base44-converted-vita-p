version: '3.8'\nservices:\n  postgres:\n    image: postgres:16-alpine\n    restart: always\n    environment:\n      POSTGRES_DB: mydb\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n    ports:\n      - "5432:5432"\n  backend:\n    build: ./backend\n    ports:\n      - "4000:4000"\n    environment:\n      DATABASE_URL: "postgresql://user:password@postgres:5432/mydb"\n      JWT_SECRET: your_jwt_secret\n      JWT_REFRESH_SECRET: your_jwt_refresh_secret\n  frontend:\n    build: ./frontend\n    ports:\n      - "3000:3000"\n  nginx:\n    image: nginx\n    ports:\n      - "80:80"\n    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf\n    depends_on:\n      - backend\n      - frontend